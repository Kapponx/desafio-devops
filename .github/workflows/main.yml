name: CI/CD com Testes e Alertas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    name: Build e Testes Unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test -- --watchAll=false

      - name: Status Alert
        if: always() # Isso garante que o alerta rode mesmo se o teste falhar
        run: |
          echo "Status da execucao: ${{ job.status }}"
          echo "Enviando alerta para o desenvolvedor Kapponx..."
